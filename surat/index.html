<!DOCTYPE html>
<html lang="id">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5"
    />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ngajionline - Daftar Surat</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --islamic-green: #0a5e2a;
        --gold: #b78d41;
        --cream: #f8f3e6;
        --light-gold: #e8d9b5;
        --dark-green: #083d1e;
        --white: #ffffff;
        --pure-white: #ffffff;
        --card-bg: #ffffff;
      }
      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--cream);
        color: #333;
        overflow-x: hidden;
        padding-top: 70px;
      }
      .navbar {
        background: linear-gradient(
          135deg,
          var(--islamic-green) 0%,
          var(--dark-green) 100%
        ) !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border-bottom: 3px solid var(--gold);
      }
      .navbar h1 {
        font-weight: 700;
        font-size: 1.8rem;
        color: var(--white);
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
      }
      .navbar h1 span {
        color: var(--light-gold);
      }
      .toggle-back {
        color: var(--light-gold) !important;
        transition: all 0.3s ease;
      }
      .toggle-back:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateX(-3px);
      }
      .section-title {
        font-family: "Amiri", serif;
        font-size: 2.5rem;
        color: var(--islamic-green);
        text-align: center;
        margin-bottom: 0.5rem;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .section-desc {
        text-align: center;
        color: #6c757d;
        margin-bottom: 2rem;
        font-size: 1.2rem;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .input-surat {
        border: 2px solid var(--light-gold);
        border-radius: 8px 0 0 8px !important;
        font-size: 1.1rem;
        background: #fffbe9;
        padding: 12px 15px;
      }
      .input-surat:focus {
        box-shadow: 0 0 0 0.25rem rgba(183, 141, 65, 0.25);
        border-color: var(--gold);
      }
      .btn-cari-ayat {
        border: 2px solid var(--light-gold);
        background: var(--gold);
        color: white;
        border-radius: 0 8px 8px 0 !important;
        font-weight: 500;
        transition: all 0.3s;
        padding: 0 20px;
        font-size: 1.1rem;
      }
      .btn-cari-ayat:hover {
        background: var(--dark-green);
        border-color: var(--gold);
      }
      .container-surat {
        margin-top: 30px;
        justify-content: center !important;
      }
      .surat-card {
        background: var(--pure-white);
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        margin-bottom: 25px;
        transition: all 0.3s ease;
        border: none;
        overflow: hidden;
        position: relative;
        width: 100%;
        max-width: 380px;
        border-top: 6px solid var(--gold);
        padding-bottom: 20px;
      }
      .surat-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        border-top: 6px solid var(--islamic-green);
      }
      .surat-number {
        position: absolute;
        top: 15px;
        left: 15px;
        background: var(--gold);
        color: white;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16);
      }
      .surat-arabic {
        font-family: "Amiri", serif;
        font-size: 5rem;
        font-display: swap; /* Pastikan font siap */
        text-align: right;
        color: var(--dark-green);
        padding: 30px 20px 10px;
        line-height: 1.4;
        min-height: 90px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-bottom: 10px;
      }
      .surat-title {
        font-weight: 1500;
        text-align: center;
        color: var(--islamic-green);
        margin-top: 15px;
        font-size: 1.5rem;
        padding: 0 20px;
      }
      .surat-info {
        text-align: center;
        color: #555;
        padding: 0 25px;
        font-size: 1.15rem;
        line-height: 1.6;
        margin-top: 12px;
      }
      .surat-translation {
        font-size: 1.3rem;
        margin-top: 15px;
        font-style: italic;
        color: var(--gold);
        font-weight: 500;
        margin-top: 10px;
        font-size: 1.2rem;
        font-size: 1.4rem;
        margin: 10px 0;
      }
      .surat-ayat-count {
        font-size: 1.1rem;
        padding: 6px 18px;
        margin-top: 12px;
        display: inline-block;
        background: var(--light-gold);
        padding: 5px 15px;
        border-radius: 20px;
        color: var(--dark-green);
        font-weight: 600;
        margin-top: 15px;
        font-size: 1rem;
      }
      .loading {
        display: flex;
        justify-content: center;
        padding: 40px;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid var(--light-gold);
        border-top: 5px solid var(--islamic-green);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      /* Add this to your existing CSS */
      .arabic-text {
        line-height: 3.5rem !important; /* Increased from 1.8 */
        margin-bottom: 1.5rem !important;
        padding-bottom: 1rem !important;
      }

      .arabic-text-modal {
        line-height: 4rem !important; /* Increased from 2 */
        margin-bottom: 2rem !important;
      }

      /* Add spacing between ayat containers */
      .ayat-container {
        margin-bottom: 2.5rem !important; /* Increased from 15px */
        padding-bottom: 1.5rem !important;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 768px) {
        .surat-arabic {
          font-size: 3.2rem !important; /* Tetap besar di mobile */
          min-height: 90px;
        }
        .navbar h1 {
          font-size: 1.5rem;
        }
        .section-title {
          font-size: 2rem;
        }
        .section-desc {
          font-size: 1rem;
          padding: 0 15px;
        }
        .surat-arabic {
          font-size: 4rem !important;
          padding: 30px 15px 15px;
          min-height: 110px;
        }
        .surat-title {
          font-size: 1.8rem;
          margin: 5px 0;
        }
        .surat-info {
          font-size: 1.05rem;
        }
        .surat-card {
          width: 100%;
          max-width: 420px; /* Diperbesar */
          min-height: 280px; /* Pastikan cukup tinggi */
          background: var(--pure-white);
          border-radius: 16px;
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
          padding: 25px 20px;
        }
        .surat-number {
          width: 38px;
          height: 38px;
          font-size: 1rem;
        }
      }

      .ayat-number-badge {
        background-color: #0a5e2a;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.1rem;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        position: relative;
        margin: 0 auto;
      }

      .ayat-number-badge:before {
        content: "";
        position: absolute;
        border: 2px solid #b78d41;
        width: 44px;
        height: 44px;
        border-radius: 50%;
      }

      .dropdown-menu {
        border: 1px solid #0a5e2a;
      }

      .dropdown-item {
        transition: all 0.3s;
      }

      .dropdown-item:hover {
        background-color: #0a5e2a;
        color: white;
      }

      .btn-tafsir-ayat {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- header -->
    <nav class="navbar fixed-top">
      <div class="container-fluid">
        <div class="col-2 ps-2">
          <a href="../index.html"
            ><i class="bi bi-arrow-left fs-3 toggle-back p-1 rounded"></i
          ></a>
        </div>
        <div class="col-8 text-center">
          <h1>
            <span>ngaji</span>online
            <small class="d-block fs-6">Daftar Surat</small>
          </h1>
        </div>
        <div class="col-2"></div>
      </div>
    </nav>

    <div class="container mt-4 pt-3">
      <div class="section-title">Daftar Surat Al-Qur'an</div>
      <div class="section-desc">
        114 Surat Al-Qur'an lengkap beserta arti, jumlah ayat, dan
        keterangan.<br />
        <span style="color: var(--gold)"
          >Klik nomor ayat untuk melihat detail ayat dan tafsir.</span
        >
      </div>
      <div class="row p-2 d-flex justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="input-group mb-4 shadow-sm">
            <input
              type="text"
              class="form-control input-surat"
              placeholder="Cari surat..."
              aria-label="Cari surat"
            />
            <button class="btn btn-cari-ayat" type="button">
              <i class="bi bi-search"></i>
              <span class="d-none d-sm-inline">Cari</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- body daftar surat -->
    <div class="container">
      <div class="loading" style="display: none">
        <div class="spinner"></div>
      </div>
      <div class="row container-surat justify-content-center">
        <!-- More cards will be added dynamically -->
      </div>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="staticBackdrop"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="staticBackdropLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.2.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
